<svg width="100%" viewBox="0 0 900 110" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="footBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="30%" stop-color="#38bdf8"/>
      <stop offset="70%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
      <animate attributeName="x1" values="-40%;0%;-40%" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;140%;100%" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <!-- terminal strip -->
  <rect x="8" y="8" width="884" height="94" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <circle cx="34" cy="30" r="5.5" fill="#ff5f56"/>
  <circle cx="54" cy="30" r="5.5" fill="#ffbd2e"/>
  <circle cx="74" cy="30" r="5.5" fill="#27c93f"/>

  <text x="40" y="66" font-family="Consolas, 'Courier New', monospace" font-size="17" fill="#c9d1d9">
    <tspan fill="#34d399">$</tspan> exit  <tspan fill="#8b949e">— thanks for stopping by. Let's build something.</tspan>
  </text>

  <rect x="472" y="51" width="10" height="19" fill="#38bdf8">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- animated accent bar -->
  <rect x="40" y="86" width="820" height="2.5" rx="1.25" fill="url(#footBar)"/>
</svg>